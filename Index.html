<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplement Overlap • Avoid Duplicates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .ingredient-tag { padding: 6px 14px; border-radius: 9999px; font-size: 0.875rem; margin: 3px; transition: all 0.2s; }
        .overlap-tag { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .warning { background: #fef3c7; color: #b45309; border: 1px solid #fcd34d; }
        .danger { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; animation: pulse 2s infinite; }
        
        .modal { animation: fadeIn 0.2s ease; }
        .dose { font-size: 0.8rem; color: #64748b; margin-left: 6px; }
        .total-dose { font-weight: 600; color: #b91c1c; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .dark body { background-color: #0f172a; }
        .dark .bg-white { background-color: #1e2937 !important; }
        .dark .ingredient-tag { background: #334155; color: #e2e8f0; }
        .dark .overlap-tag { background: #7f1d1d; color: #fecaca; }
        .dark .warning { background: #78350f; color: #fcd34d; }
        .dark .danger { background: #991b1b; color: #fecaca; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div class="max-w-7xl mx-auto min-h-screen flex flex-col">
        
        <!-- Navbar -->
        <nav class="bg-white border-b sticky top-0 z-50 shadow-sm dark:bg-slate-900 dark:border-slate-700">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-2xl">💊</div>
                    <div>
                        <h1 class="text-3xl font-semibold tracking-tight text-slate-900 dark:text-white">Supplement Overlap</h1>
                        <p class="text-xs text-emerald-600 dark:text-emerald-400 -mt-1">Track + Safety Warnings</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-4">
                    <button onclick="toggleTheme()" class="w-11 h-11 flex items-center justify-center text-2xl rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        <span id="theme-icon">☀️</span>
                    </button>

                    <button onclick="exportCSV()" class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-3xl border dark:text-slate-300 dark:hover:bg-slate-800">
                        <i class="fa-solid fa-file-csv"></i><span class="hidden sm:inline">CSV</span>
                    </button>
                    <button onclick="exportData()" class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-3xl border dark:text-slate-300 dark:hover:bg-slate-800">
                        <i class="fa-solid fa-download"></i><span class="hidden sm:inline">JSON</span>
                    </button>
                    
                    <label onclick="document.getElementById('import-input').click()" class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-3xl border cursor-pointer dark:text-slate-300 dark:hover:bg-slate-800">
                        <i class="fa-solid fa-upload"></i><span class="hidden sm:inline">Import</span>
                    </label>
                    <input type="file" id="import-input" accept=".json" class="hidden" onchange="importData(event)">
                    
                    <button onclick="clearAllData()" class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-medium text-red-600 hover:bg-red-50 rounded-3xl border border-red-200 dark:text-red-400 dark:hover:bg-red-950">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Search Bar -->
        <div class="bg-white dark:bg-slate-900 border-b px-8 py-4 sticky top-[73px] z-40">
            <div class="max-w-2xl mx-auto relative">
                <input id="search-input" onkeyup="filterContent()" type="text" 
                       class="w-full px-6 py-4 pl-12 border border-slate-200 dark:border-slate-700 rounded-3xl focus:border-emerald-400 outline-none text-lg"
                       placeholder="Search bottles or ingredients...">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
            </div>
        </div>

        <div class="flex flex-1 overflow-hidden">
            <!-- Sidebar -->
            <div id="sidebar" class="w-80 bg-white border-r flex flex-col dark:bg-slate-900 dark:border-slate-700 md:block hidden">
                <div class="p-6 border-b dark:border-slate-700 flex items-center justify-between">
                    <div>
                        <h2 class="text-lg font-semibold text-slate-800 dark:text-white">My Bottles</h2>
                        <p class="text-xs text-slate-500 dark:text-slate-400">Sorted alphabetically</p>
                    </div>
                    <button onclick="showAddModal()" class="w-9 h-9 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl flex items-center justify-center text-xl">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div id="sidebar-bottles" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
                <div id="sidebar-empty" class="hidden flex-1 flex flex-col items-center justify-center text-center px-8">
                    <i class="fa-solid fa-capsules text-6xl text-slate-300 dark:text-slate-600 mb-6"></i>
                    <p class="text-slate-500 dark:text-slate-400 font-medium">No supplements yet</p>
                    <button onclick="showAddModal()" class="mt-6 px-6 py-3 bg-emerald-600 text-white rounded-3xl text-sm font-medium">+ Add First Bottle</button>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="flex-1 p-6 md:p-8 overflow-y-auto">
                <div class="mb-12">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                        <h2 class="text-2xl font-semibold flex items-center gap-x-3 text-slate-900 dark:text-white">
                            <i class="fa-solid fa-exclamation-triangle text-amber-500"></i>
                            Overlapping Ingredients
                        </h2>
                        <button onclick="showLimitsModal()" 
                                class="flex items-center gap-x-2 px-5 py-2.5 text-sm font-medium bg-white border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-3xl">
                            <i class="fa-solid fa-sliders"></i>
                            <span>Manage Safety Limits</span>
                        </button>
                    </div>
                    <div id="overlaps-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                </div>

                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-x-3 text-slate-900 dark:text-white">
                    <i class="fa-solid fa-list-check"></i> Your Collection
                </h2>
                <div id="bottles-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Bottle Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="modal bg-white dark:bg-slate-800 rounded-3xl max-w-lg w-full mx-4 shadow-2xl">
            <div class="px-8 pt-8 pb-6">
                <h3 id="modal-title" class="text-2xl font-semibold text-slate-900 dark:text-white">Add New Supplement Bottle</h3>
                <div class="mt-8 space-y-8">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">Bottle / Product Name</label>
                        <input id="name-input" type="text" class="w-full px-5 py-4 border border-slate-200 dark:border-slate-700 focus:border-emerald-400 rounded-3xl text-lg outline-none bg-white dark:bg-slate-700 dark:text-white" placeholder="e.g. Nature Made Vitamin D3">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">Ingredients & Dosage (one per line)</label>
                        <textarea id="ingredients-input" rows="10" class="w-full px-5 py-4 border border-slate-200 dark:border-slate-700 focus:border-emerald-400 rounded-3xl resize-none outline-none bg-white dark:bg-slate-700 dark:text-white" placeholder="Vitamin B6 14 mg&#10;Vitamin D3 2000 IU&#10;Magnesium 400 mg"></textarea>
                    </div>
                </div>
            </div>
            <div class="border-t dark:border-slate-700 px-8 py-6 flex gap-4">
                <button onclick="hideModal()" class="flex-1 py-4 text-slate-600 dark:text-slate-400 font-medium rounded-3xl hover:bg-slate-100 dark:hover:bg-slate-700">Cancel</button>
                <button onclick="saveBottle()" id="save-btn" class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-3xl">Save Bottle</button>
            </div>
        </div>
    </div>

    <!-- Manage Safety Limits Modal with Units -->
    <div id="limits-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white dark:bg-slate-800 rounded-3xl max-w-lg w-full mx-4 shadow-2xl max-h-[85vh] flex flex-col">
            <div class="px-8 pt-8 pb-4 border-b dark:border-slate-700">
                <h3 class="text-2xl font-semibold text-slate-900 dark:text-white">Manage Safety Limits</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
                    Set upper daily limits with matching units (mg, mcg, IU, etc.)
                </p>
            </div>
            
            <div id="limits-list" class="flex-1 overflow-y-auto p-8 space-y-6"></div>
            
            <div class="p-8 border-t dark:border-slate-700 flex gap-3">
                <button onclick="addNewLimit()" class="flex-1 py-3 border border-slate-300 dark:border-slate-600 rounded-3xl hover:bg-slate-50 dark:hover:bg-slate-700">+ Add New Limit</button>
                <button onclick="hideLimitsModal()" class="flex-1 py-3 bg-emerald-600 text-white rounded-3xl hover:bg-emerald-700">Done</button>
            </div>
        </div>
    </div>

    <script>
        let bottles = []
        let editingId = null
        let upperLimits = {}   // format: { "vitamin b6": {limit: 100, unit: "mg"} }

        const STORAGE_KEY = 'supplement-overlap-data-v9'
        const LIMITS_KEY = 'supplement-upper-limits-v2'

        const DEFAULT_LIMITS = {
            "vitamin d": {limit: 4000, unit: "IU"},
            "vitamin d3": {limit: 4000, unit: "IU"},
            "magnesium": {limit: 350, unit: "mg"},
            "zinc": {limit: 40, unit: "mg"},
            "vitamin c": {limit: 2000, unit: "mg"},
            "calcium": {limit: 2500, unit: "mg"},
            "vitamin a": {limit: 3000, unit: "IU"},
            "iron": {limit: 45, unit: "mg"},
            "vitamin e": {limit: 1000, unit: "IU"},
            "selenium": {limit: 400, unit: "mcg"},
            "vitamin b6": {limit: 100, unit: "mg"},
            "vitamin b12": {limit: 2000, unit: "mcg"}
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY)
            bottles = saved ? JSON.parse(saved) : []
            const savedLimits = localStorage.getItem(LIMITS_KEY)
            upperLimits = savedLimits ? JSON.parse(savedLimits) : {...DEFAULT_LIMITS}
        }

        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(bottles)) }
        function saveLimits() { localStorage.setItem(LIMITS_KEY, JSON.stringify(upperLimits)) }

        function getUpperLimit(name) {
            const entry = upperLimits[name.toLowerCase().trim()]
            return entry ? entry.limit : null
        }

        function getUpperUnit(name) {
            const entry = upperLimits[name.toLowerCase().trim()]
            return entry ? entry.unit : ""
        }

        function parseIngredientLine(line) {
            const trimmed = line.trim()
            if (!trimmed) return null

            const numbers = trimmed.match(/[\d.,]+/g)
            if (!numbers || numbers.length === 0) {
                return { name: trimmed, dose: null, numeric: null }
            }

            const doseStr = numbers[numbers.length - 1]
            const numeric = parseFloat(doseStr.replace(/,/g, ''))

            let name = trimmed.replace(new RegExp(doseStr + '\\s*[^\\s]*$', 'i'), '').trim()
            if (name === '') name = trimmed.replace(doseStr, '').trim()

            return {
                name: name,
                dose: trimmed.replace(name, '').trim(),
                numeric: isNaN(numeric) ? null : numeric
            }
        }

        function showAddModal() {
            editingId = null
            document.getElementById('modal-title').textContent = 'Add New Supplement Bottle'
            document.getElementById('name-input').value = ''
            document.getElementById('ingredients-input').value = ''
            document.getElementById('save-btn').textContent = 'Add Bottle'
            document.getElementById('modal').classList.remove('hidden')
        }

        function hideModal() {
            document.getElementById('modal').classList.add('hidden')
            editingId = null
        }

        function saveBottle() {
            const name = document.getElementById('name-input').value.trim()
            if (!name) return alert('Please enter a bottle name')

            const ingredients = document.getElementById('ingredients-input').value
                .split('\n')
                .map(parseIngredientLine)
                .filter(i => i)

            if (ingredients.length === 0) return alert('Please add at least one ingredient')

            if (editingId) {
                const bottle = bottles.find(b => b.id === editingId)
                if (bottle) {
                    bottle.name = name
                    bottle.ingredients = ingredients
                }
            } else {
                bottles.push({ 
                    id: Date.now().toString(36) + Math.random().toString(36).slice(2), 
                    name, 
                    ingredients 
                })
            }

            saveData()
            hideModal()
            renderEverything()
        }

        function editBottle(id) {
            const bottle = bottles.find(b => b.id === id)
            if (!bottle) return
            editingId = id
            document.getElementById('modal-title').textContent = 'Edit Bottle'
            document.getElementById('name-input').value = bottle.name
            const text = bottle.ingredients.map(ing => 
                ing.dose ? `${ing.name} ${ing.dose}` : ing.name
            ).join('\n')
            document.getElementById('ingredients-input').value = text
            document.getElementById('save-btn').textContent = 'Save Changes'
            document.getElementById('modal').classList.remove('hidden')
        }

        function deleteBottle(id) {
            if (confirm('Delete this bottle?')) {
                bottles = bottles.filter(b => b.id !== id)
                saveData()
                renderEverything()
            }
        }

        function sortBottles(arr) {
            return [...arr].sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()))
        }

        function computeOverlaps() {
            const map = new Map()
            bottles.forEach(bottle => {
                bottle.ingredients.forEach(ing => {
                    const key = ing.name.toLowerCase().trim()
                    if (!map.has(key)) {
                        map.set(key, { original: ing.name, count: 0, bottles: new Set(), doses: [], numerics: [] })
                    }
                    const entry = map.get(key)
                    entry.count++
                    entry.bottles.add(bottle.name)
                    if (ing.dose) entry.doses.push(ing.dose)
                    if (ing.numeric !== null && !isNaN(ing.numeric)) entry.numerics.push(ing.numeric)
                })
            })
            return Array.from(map.values())
                .filter(e => e.count > 1)
                .sort((a, b) => b.count - a.count || a.original.localeCompare(b.original))
        }

        function calculateTotal(numerics) {
            return numerics.length ? numerics.reduce((a, b) => a + b, 0) : null
        }

        function showLimitsModal() {
            const container = document.getElementById('limits-list')
            container.innerHTML = ''

            Object.keys(upperLimits).sort().forEach(key => {
                const entry = upperLimits[key]
                const div = document.createElement('div')
                div.className = "flex items-center gap-4 bg-slate-50 dark:bg-slate-700 p-4 rounded-2xl"
                div.innerHTML = `
                    <div class="flex-1">
                        <input type="text" value="${key}" class="w-full bg-transparent font-medium outline-none" onchange="updateLimitKey('${key}', this.value)">
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="number" value="${entry.limit}" class="w-24 px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-2xl text-center" onchange="updateLimitValue('${key}', this.value)">
                        <input type="text" value="${entry.unit}" class="w-20 px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-2xl text-center" onchange="updateLimitUnit('${key}', this.value)" placeholder="unit">
                        <button onclick="removeLimit('${key}')" class="text-red-500 hover:text-red-600 p-2"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `
                container.appendChild(div)
            })
            document.getElementById('limits-modal').classList.remove('hidden')
        }

        function updateLimitKey(oldKey, newKey) {
            if (!newKey || oldKey === newKey.toLowerCase().trim()) return
            const entry = upperLimits[oldKey]
            delete upperLimits[oldKey]
            upperLimits[newKey.toLowerCase().trim()] = entry
            saveLimits()
        }

        function updateLimitValue(key, newValue) {
            const num = parseFloat(newValue)
            if (!isNaN(num) && num > 0) {
                upperLimits[key].limit = num
                saveLimits()
            }
        }

        function updateLimitUnit(key, newUnit) {
            if (newUnit && newUnit.trim()) {
                upperLimits[key].unit = newUnit.trim()
                saveLimits()
            }
        }

        function removeLimit(key) {
            if (confirm(`Remove limit for "${key}"?`)) {
                delete upperLimits[key]
                saveLimits()
                showLimitsModal()
            }
        }

        function addNewLimit() {
            const name = prompt("Enter ingredient name:")
            if (!name) return
            const limit = parseFloat(prompt(`Upper daily limit for ${name}:`))
            if (isNaN(limit) || limit <= 0) return alert("Please enter a valid positive number")
            const unit = prompt("Unit (mg, mcg, IU, etc.):", "mg") || "mg"
            upperLimits[name.toLowerCase().trim()] = {limit: limit, unit: unit.trim()}
            saveLimits()
            showLimitsModal()
        }

        function hideLimitsModal() {
            document.getElementById('limits-modal').classList.add('hidden')
            renderOverlaps()
        }

        function renderSidebar(searchTerm = '') {
            const container = document.getElementById('sidebar-bottles')
            const empty = document.getElementById('sidebar-empty')
            let filtered = bottles.filter(b => 
                !searchTerm || b.name.toLowerCase().includes(searchTerm) || 
                b.ingredients.some(i => i.name.toLowerCase().includes(searchTerm))
            )

            if (filtered.length === 0) {
                container.innerHTML = ''
                empty.classList.remove('hidden')
                return
            }
            empty.classList.add('hidden')

            const sorted = sortBottles(filtered)
            let html = ''
            sorted.forEach(b => {
                html += `
                <div onclick="editBottle('${b.id}')" class="group flex justify-between items-center px-4 py-4 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-3xl cursor-pointer">
                    <div class="flex-1 min-w-0">
                        <div class="font-medium text-slate-800 dark:text-white truncate">${b.name}</div>
                        <div class="text-xs text-slate-500 dark:text-slate-400">${b.ingredients.length} ingredients</div>
                    </div>
                    <button onclick="event.stopImmediatePropagation(); deleteBottle('${b.id}');" class="text-red-400 hover:text-red-600 p-2 opacity-0 group-hover:opacity-100">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>`
            })
            container.innerHTML = html
        }

        function renderBottlesGrid(searchTerm = '') {
            const container = document.getElementById('bottles-grid')
            const overlaps = computeOverlaps()
            const overlappingNames = new Set(overlaps.map(o => o.original.toLowerCase()))

            let filtered = bottles.filter(b => 
                !searchTerm || b.name.toLowerCase().includes(searchTerm) || 
                b.ingredients.some(i => i.name.toLowerCase().includes(searchTerm))
            )

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 dark:text-slate-500">No matching bottles found.</div>`
                return
            }

            const sorted = sortBottles(filtered)
            let html = ''
            sorted.forEach(bottle => {
                const ingHTML = bottle.ingredients.map(ing => {
                    const isOverlap = overlappingNames.has(ing.name.toLowerCase())
                    const doseHTML = ing.dose ? `<span class="dose">(${ing.dose})</span>` : ''
                    return `<span class="ingredient-tag ${isOverlap ? 'overlap-tag' : ''}">${ing.name}${doseHTML}</span>`
                }).join('')

                html += `
                <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-3xl p-6 hover:shadow-xl transition-all">
                    <div class="flex justify-between items-start mb-5">
                        <h3 class="font-semibold text-xl text-slate-900 dark:text-white">${bottle.name}</h3>
                        <div class="flex gap-x-3 text-slate-400">
                            <i onclick="event.stopImmediatePropagation(); editBottle('${bottle.id}')" class="fa-solid fa-pen cursor-pointer hover:text-emerald-500"></i>
                            <i onclick="event.stopImmediatePropagation(); deleteBottle('${bottle.id}')" class="fa-solid fa-trash-can cursor-pointer hover:text-red-500"></i>
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-x-2 gap-y-1">${ingHTML}</div>
                </div>`
            })
            container.innerHTML = html
        }

        function renderOverlaps() {
            const container = document.getElementById('overlaps-grid')
            const overlaps = computeOverlaps()

            if (overlaps.length === 0) {
                container.innerHTML = `
                <div class="col-span-full bg-emerald-50 dark:bg-emerald-950 border border-emerald-200 dark:border-emerald-800 rounded-3xl p-10 text-center">
                    <i class="fa-solid fa-circle-check text-6xl text-emerald-500 mb-6"></i>
                    <p class="text-2xl font-medium text-emerald-700 dark:text-emerald-300">No overlaps detected!</p>
                </div>`
                return
            }

            let html = ''
            overlaps.forEach(item => {
                const bottleList = Array.from(item.bottles).join(' • ')
                const dosesList = item.doses.length ? item.doses.join(', ') : 'No dosage specified'
                const total = calculateTotal(item.numerics)

                let warningClass = '', warningText = ''
                if (total !== null) {
                    const limit = getUpperLimit(item.original)
                    const unit = getUpperUnit(item.original)
                    if (limit) {
                        const displayUnit = unit ? ` ${unit}` : ''
                        if (total > limit) {
                            warningClass = 'danger'
                            warningText = `<p class="mt-2 text-xs font-medium text-red-600 dark:text-red-400">⚠️ Exceeds upper limit (${limit}${displayUnit})</p>`
                        } else if (total > limit * 0.8) {
                            warningClass = 'warning'
                            warningText = `<p class="mt-2 text-xs font-medium text-amber-600">Approaching upper limit (${limit}${displayUnit})</p>`
                        }
                    }
                }

                html += `
                <div class="bg-white dark:bg-slate-800 border border-red-100 dark:border-red-900 rounded-3xl p-6 transition-colors ${warningClass}">
                    <div class="flex items-baseline justify-between">
                        <div class="font-semibold text-lg text-slate-900 dark:text-white">${item.original}</div>
                        <div class="px-4 py-1 text-sm font-semibold bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300 rounded-3xl">${item.count}×</div>
                    </div>
                    <p class="mt-4 text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500">Appears in</p>
                    <p class="text-slate-600 dark:text-slate-400 text-sm mt-1">${bottleList}</p>
                    <p class="mt-4 text-xs uppercase tracking-widest text-slate-400 dark:text-slate-500">Doses seen</p>
                    <p class="text-slate-600 dark:text-slate-400 text-sm">${dosesList}</p>
                    ${total !== null ? `<p class="mt-3 text-sm total-dose">Total = ${total}</p>` : ''}
                    ${warningText}
                </div>`
            })
            container.innerHTML = html
        }

        function renderEverything(searchTerm = '') {
            renderSidebar(searchTerm)
            renderBottlesGrid(searchTerm)
            renderOverlaps()
        }

        function filterContent() {
            const term = document.getElementById('search-input').value.toLowerCase().trim()
            renderEverything(term)
        }

        function exportData() {
            if (bottles.length === 0) return alert("Nothing to export!")
            const dataStr = JSON.stringify(bottles, null, 2)
            const blob = new Blob([dataStr], { type: 'application/json' })
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url
            a.download = `supplement-overlap-${new Date().toISOString().slice(0,10)}.json`
            a.click()
            URL.revokeObjectURL(url)
        }

        function exportCSV() {
            if (bottles.length === 0) return alert("Nothing to export!")
            let csv = "Bottle Name,Ingredient,Dose\n"
            bottles.forEach(b => {
                b.ingredients.forEach(ing => {
                    csv += `"${b.name.replace(/"/g, '""')}","${ing.name.replace(/"/g, '""')}","${(ing.dose || '').replace(/"/g, '""')}"\n`
                })
            })
            const blob = new Blob([csv], { type: 'text/csv' })
            const url = URL.createObjectURL(blob)
            const a = document.createElement('a')
            a.href = url
            a.download = `supplement-overlap-${new Date().toISOString().slice(0,10)}.csv`
            a.click()
            URL.revokeObjectURL(url)
        }

        function importData(e) {
            const file = e.target.files[0]
            if (!file) return
            const reader = new FileReader()
            reader.onload = function(ev) {
                try {
                    const imported = JSON.parse(ev.target.result)
                    bottles = imported.filter(b => b.name && Array.isArray(b.ingredients))
                    saveData()
                    renderEverything()
                    alert(`✅ Successfully imported ${bottles.length} bottles!`)
                } catch (err) {
                    alert('❌ Could not read this file. Make sure it is a valid Supplement Overlap backup.')
                }
            }
            reader.readAsText(file)
            e.target.value = ''
        }

        function clearAllData() {
            if (confirm('Delete ALL data permanently?')) {
                bottles = []
                saveData()
                renderEverything()
            }
        }

        function initTheme() {
            const saved = localStorage.getItem('theme')
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark')
                document.getElementById('theme-icon').textContent = '🌗'
            }
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark')
            document.getElementById('theme-icon').textContent = isDark ? '🌗' : '☀️'
            localStorage.setItem('theme', isDark ? 'dark' : 'light')
        }

        window.onload = () => {
            initTheme()
            loadData()
            renderEverything()

            window.loadDemoData = function() {
                bottles = [
                    { id: "d1", name: "Amino Acid Synergy", ingredients: [{name: "Vitamin B6", dose: "14 mg", numeric: 14}] },
                    { id: "d2", name: "Memory Ease", ingredients: [{name: "Vitamin B6", dose: "40 mg", numeric: 40}] }
                ]
                saveData()
                renderEverything()
            }
        }
    </script>
</body>
</html>
